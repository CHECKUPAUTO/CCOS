name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Keep the single consolidated build's disk footprint small enough for a
  # GitHub-hosted runner. The all-features debug build of the whole workspace —
  # every example and test binary — was exhausting the runner disk at link time
  # ("No space left on device" / ld Bus error). Debug info is the bulk of
  # `target/` and is irrelevant to `clippy -D warnings`, test pass/fail, and doc
  # builds, so stripping it (and disabling incremental artifacts) changes no
  # result — it only shrinks `target/`.
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"

# A single consolidated job keeps GitHub Actions minute usage low on this private
# repo: one checkout, one toolchain setup, and one shared `target/` so
# dependencies compile once and every step reuses them; dependency caching cuts
# repeat runs further. Cheapest checks run first (fail-fast). Only GitHub-authored
# actions are used (actions/checkout, actions/cache) so no third-party action can
# be blocked by org policy. The slower `cargo audit` runs weekly in audit.yml,
# off the per-push path.
jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Reclaim ~20 GB of runner disk (large preinstalled SDKs this build never
      # uses) so the consolidated all-features compile cannot exhaust the device.
      # Pure shell — no third-party action, matching this workflow's policy.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/local/.ghcup \
            /usr/share/dotnet /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          df -h /

      - name: Set up Rust
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup component add rustfmt clippy
          rustc --version && cargo --version

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # Cheapest first: formatting needs no compilation.
      - name: Format
        run: cargo fmt --all --check

      # One compile of all dependencies (incl. the optional `syn` path), reused
      # by the test/doc/run steps below.
      - name: Clippy (default + all features)
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Test (default — real `syn` AST is now the default parser)
        run: cargo test --locked

      - name: Test (--no-default-features — line-heuristic fallback)
        run: cargo test --no-default-features --locked

      - name: Test (llm feature — async modules + binary)
        run: cargo test --features llm --locked

      - name: Test (learned-embed feature — LSA semantic embedder)
        run: cargo test --features learned-embed --locked

      - name: Test (license feature — offline ed25519 verifier)
        run: cargo test --features license --locked

      - name: Test (license-pq feature — offline post-quantum SLH-DSA verifier)
        run: cargo test --features license-pq --locked

      - name: Test (license + license-pq — both verifiers compose, cross-scheme isolation)
        run: cargo test --features license,license-pq --locked

      - name: Docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        # `--all-features` so the feature-gated modules (llm/eval/workspace) and
        # the intra-doc links that reference them resolve.
        run: cargo doc --no-deps --all-features --locked

      - name: Smoke-test the CLI
        run: |
          cargo run --locked --features llm -- version
          cargo run --locked --features llm -- analyze src --out /tmp/run.json
          cargo run --locked --features llm -- verify /tmp/run.json
          cargo run --locked --features llm -- replay /tmp/run.json
          cargo run --locked --features llm -- top src --limit 10
          cargo run --locked --features llm -- blame /tmp/run.json file:src/lib.rs --depth 3
          cargo run --locked --features llm -- export /tmp/run.json --out /tmp/ccos.graphml
          cargo run --locked --features llm -- regions src
          cargo run --locked --features llm -- regions src --activate file:src/lib.rs
          cargo run --locked --features llm -- regions src --metrics file:src/lib.rs --json
          cargo run --locked --features llm -- experiment --tasks 60
          cargo run --locked --features llm -- eval --tasks 4
          printf '%s\n' '{"op":"ingest","uri":"src/x.rs","source":"pub fn x() {}"}' '{"op":"recall","strategy":"working_set","budget":512}' '{"op":"verify"}' | cargo run --locked --features llm -- stdin
          cargo run --locked --features llm -- chaos --iters 500
          cargo run --locked --features llm -- license
          # Post-quantum license verifier builds + runs under each feature combo (the embedded
          # key is the fail-closed placeholder, so the tier stays community — the verify→Pro path
          # is covered by the `license-pq` unit tests above, not by this smoke).
          cargo run --locked --features llm,license-pq -- doctor
          cargo run --locked --features llm,license,license-pq -- doctor
          cargo run --locked --features license-pq --example license_sign_pq -- keygen >/dev/null
