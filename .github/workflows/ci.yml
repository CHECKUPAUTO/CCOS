name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    name: build · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Rust is pre-installed on ubuntu-latest; use rustup directly so the
      # workflow needs no third-party actions (which org policy may block).
      - name: Set up Rust
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup component add clippy
          rustc --version && cargo --version

      - name: Build
        run: cargo build --all-targets --locked

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Smoke-test the CLI
        run: |
          cargo run --locked -- version
          cargo run --locked -- analyze src --out /tmp/run.json
          cargo run --locked -- verify /tmp/run.json
          cargo run --locked -- replay /tmp/run.json
          cargo run --locked -- chaos --iters 500
