name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# Only GitHub-authored actions (actions/checkout) + the runner's pre-installed
# rustup are used, so no third-party action can be blocked by org policy.
jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup component add rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup component add clippy
      # --all-features so the optional `syn-parser` code path is linted too.
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustc --version && cargo --version
      - name: Build
        run: cargo build --all-targets --locked
      - name: Test (default — zero-dep heuristic parser)
        run: cargo test --locked
      - name: Test (syn-parser feature — real AST)
        run: cargo test --features syn-parser --locked
      - name: Smoke-test the CLI
        run: |
          cargo run --locked -- version
          cargo run --locked -- analyze src --out /tmp/run.json
          cargo run --locked -- verify /tmp/run.json
          cargo run --locked -- replay /tmp/run.json
          cargo run --locked -- top src --limit 10
          cargo run --locked -- blame /tmp/run.json file:src/lib.rs --depth 3
          cargo run --locked -- export /tmp/run.json --out /tmp/ccos.graphml
          cargo run --locked -- chaos --iters 500

  docs:
    name: Docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        run: |
          rustup update stable --no-self-update
          rustup default stable
      - run: cargo doc --no-deps --locked

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    # Informational: a transitive-dependency advisory outside our control should
    # not block the pipeline. Surfaced as a check, but non-blocking.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        run: |
          rustup update stable --no-self-update
          rustup default stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        run: cargo audit
