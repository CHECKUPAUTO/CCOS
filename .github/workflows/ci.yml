name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# A single consolidated job keeps GitHub Actions minute usage low on this private
# repo: one checkout, one toolchain setup, and one shared `target/` so
# dependencies compile once and every step reuses them; dependency caching cuts
# repeat runs further. Cheapest checks run first (fail-fast). Only GitHub-authored
# actions are used (actions/checkout, actions/cache) so no third-party action can
# be blocked by org policy. The slower `cargo audit` runs weekly in audit.yml,
# off the per-push path.
jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup component add rustfmt clippy
          rustc --version && cargo --version

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # Cheapest first: formatting needs no compilation.
      - name: Format
        run: cargo fmt --all --check

      # One compile of all dependencies (incl. the optional `syn` path), reused
      # by the test/doc/run steps below.
      - name: Clippy (default + all features)
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Test (default — zero-dep heuristic parser)
        run: cargo test --locked

      - name: Test (syn-parser feature — real AST)
        run: cargo test --features syn-parser --locked

      - name: Docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --locked

      - name: Smoke-test the CLI
        run: |
          cargo run --locked -- version
          cargo run --locked -- analyze src --out /tmp/run.json
          cargo run --locked -- verify /tmp/run.json
          cargo run --locked -- replay /tmp/run.json
          cargo run --locked -- top src --limit 10
          cargo run --locked -- blame /tmp/run.json file:src/lib.rs --depth 3
          cargo run --locked -- export /tmp/run.json --out /tmp/ccos.graphml
          cargo run --locked -- regions src
          cargo run --locked -- regions src --activate file:src/lib.rs
          cargo run --locked -- regions src --metrics file:src/lib.rs --json
          cargo run --locked -- experiment --tasks 60
          cargo run --locked -- chaos --iters 500
